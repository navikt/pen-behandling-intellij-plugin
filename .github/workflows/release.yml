name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get plugin ZIP filename
        id: zip
        run: echo "FILENAME=$(basename build/distributions/*.zip)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Generate updatePlugins.xml
        run: |
          mkdir -p _site
          DOWNLOAD_URL="https://github.com/navikt/pen-behandling-intellij-plugin/releases/download/${GITHUB_REF_NAME}/${{ steps.zip.outputs.FILENAME }}"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<plugins>' \
            "  <plugin id=\"no.nav.pensjon.pen.behandling-plugin\"" \
            "          url=\"${DOWNLOAD_URL}\"" \
            "          version=\"${{ steps.version.outputs.VERSION }}\">" \
            '    <idea-version since-build="243" until-build="261.*"/>' \
            '    <name>PEN Behandling Toolkit</name>' \
            '    <vendor>NAV Pensjon</vendor>' \
            '    <description>Genererer kode for nye behandlinger og aktiviteter i PEN</description>' \
            '  </plugin>' \
            '</plugins>' > _site/updatePlugins.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
